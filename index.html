<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Clarity Report — Edition I: Your Money, The New Rules</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:   #0c0c10;
    --ink2:  #141418;
    --ink3:  #1c1c22;
    --rule:  rgba(255,255,255,0.07);
    --gold:  #c9a84c;
    --gdim:  rgba(201,168,76,0.1);
    --gpale: rgba(201,168,76,0.05);
    --text:  #ede9e0;
    --muted: rgba(237,233,224,0.42);
    --warm:  #d4a574;
    --teal:  #6bb5a8;
    --green: #5cb88a;
  }

  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--text); }

  /* MASTHEAD */
  #mast {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: var(--ink); border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 50px;
  }
  .mast-l { display: flex; align-items: baseline; gap: 12px; }
  .pub-nm { font-family: 'EB Garamond', serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); }
  .ed-tag { font-size: 0.63rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); border-left: 1px solid var(--rule); padding-left: 10px; }
  #prog { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--gold); transition: width 0.4s ease; }
  .ctr-top { font-size: 0.7rem; color: var(--muted); }

  /* STAGE */
  #stage { position: fixed; top: 50px; bottom: 60px; left: 0; right: 0; overflow: hidden; }

  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 36px 44px 20px;
    opacity: 0; transform: translateY(20px);
    pointer-events: none;
    transition: opacity 0.5s ease, transform 0.5s ease;
    text-align: center;
  }
  .slide.active { opacity: 1; transform: translateY(0); pointer-events: all; }

  /* THEMES */
  .t-ink   { background: #0c0c10; }
  .t-warm  { background: #110d08; }
  .t-deep  { background: #080c10; }
  .t-rich  { background: #0c0810; }
  .t-slate { background: #090c12; }
  .t-close { background: #0c0c10; }

  /* TYPE */
  .kicker { font-size: 0.63rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); opacity: 0.75; margin-bottom: 14px; }
  .display { font-family: 'EB Garamond', serif; font-size: clamp(2.2rem, 5.5vw, 4.2rem); line-height: 1.08; font-weight: 600; margin-bottom: 16px; max-width: 820px; }
  .display em { font-style: italic; color: var(--gold); }
  .deck { font-size: clamp(0.9rem, 1.9vw, 1.15rem); line-height: 1.72; color: var(--muted); max-width: 620px; font-weight: 300; margin-bottom: 18px; }
  .rule-line { width: 36px; height: 1px; background: var(--gold); opacity: 0.45; margin: 14px auto; }

  /* OPENING STATEMENT */
  .open-stmt {
    max-width: 680px;
    font-family: 'EB Garamond', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    font-style: italic;
    line-height: 1.6;
    color: var(--text);
    opacity: 0.88;
    margin-bottom: 20px;
  }

  /* EDITION STAMP */
  .stamp { display: inline-flex; align-items: center; gap: 10px; border: 1px solid rgba(201,168,76,0.28); border-radius: 3px; padding: 6px 16px; margin-bottom: 24px; }
  .stamp .rom { font-family: 'EB Garamond', serif; font-size: 0.82rem; letter-spacing: 0.15em; color: var(--gold); text-transform: uppercase; }
  .stamp .sep { color: var(--rule); }
  .stamp .dt { font-size: 0.63rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

  /* DISCLAIMER BAND */
  .disc-band { border-top: 1px solid var(--rule); margin-top: 22px; padding-top: 14px; max-width: 640px; font-size: 0.7rem; color: var(--muted); line-height: 1.65; opacity: 0.65; }

  /* CARDS */
  .card-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 860px; margin-top: 6px; }
  .card { background: rgba(255,255,255,0.04); border: 1px solid var(--rule); border-radius: 10px; padding: 20px 16px; flex: 1; min-width: 180px; max-width: 240px; text-align: left; }
  .cg { font-size: 1.5rem; margin-bottom: 9px; display: block; }
  .ct { font-family: 'EB Garamond', serif; font-size: 1rem; font-weight: 600; color: var(--gold); margin-bottom: 6px; }
  .cb { font-size: 0.78rem; line-height: 1.65; color: var(--muted); }

  /* VS */
  .vs-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 780px; margin-top: 6px; }
  .vs-box { flex: 1; min-width: 200px; border-radius: 10px; padding: 18px 16px; text-align: left; }
  .vs-box.old { background: rgba(180,60,60,0.07); border: 1px solid rgba(180,60,60,0.16); }
  .vs-box.new { background: rgba(107,181,168,0.07); border: 1px solid rgba(107,181,168,0.16); }
  .vs-lbl { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; opacity: 0.55; }
  .vs-box.old .vs-lbl { color: #e07070; }
  .vs-box.new .vs-lbl { color: var(--teal); }
  .vs-box ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .vs-box ul li { font-size: 0.8rem; line-height: 1.5; opacity: 0.82; padding-left: 12px; position: relative; }
  .vs-box ul li::before { content: '—'; position: absolute; left: 0; opacity: 0.35; }

  /* STEPS */
  .steps { display: flex; flex-direction: column; gap: 10px; max-width: 660px; text-align: left; margin-top: 6px; }
  .step { display: flex; gap: 12px; align-items: flex-start; background: rgba(255,255,255,0.03); border: 1px solid var(--rule); border-radius: 9px; padding: 12px 14px; }
  .sn { width: 26px; height: 26px; border-radius: 50%; background: var(--gdim); border: 1px solid rgba(201,168,76,0.22); color: var(--gold); font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'EB Garamond', serif; }
  .sc strong { display: block; font-size: 0.86rem; font-weight: 600; margin-bottom: 2px; }
  .sc span { font-size: 0.77rem; color: var(--muted); line-height: 1.55; }

  /* FLOW */
  .flow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
  .fn { background: rgba(255,255,255,0.04); border: 1px solid var(--rule); border-radius: 8px; padding: 9px 12px; font-size: 0.74rem; text-align: center; max-width: 105px; line-height: 1.4; }
  .fa { color: var(--gold); opacity: 0.45; font-size: 0.9rem; }

  /* ICON GRID */
  .igrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; max-width: 660px; margin-top: 10px; }
  .ic { background: rgba(255,255,255,0.03); border: 1px solid var(--rule); border-radius: 9px; padding: 14px 10px; text-align: center; }
  .ic .em { font-size: 1.4rem; margin-bottom: 6px; display: block; }
  .ic .lb { font-size: 0.74rem; font-weight: 600; }
  .ic .sb { font-size: 0.66rem; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  /* CALLOUT */
  .callout { border-radius: 9px; padding: 13px 18px; font-size: 0.81rem; line-height: 1.65; max-width: 640px; margin-top: 12px; text-align: left; }
  .callout.gold { background: var(--gpale); border: 1px solid rgba(201,168,76,0.18); }
  .callout.teal { background: rgba(107,181,168,0.06); border: 1px solid rgba(107,181,168,0.16); }
  .callout.warm { background: rgba(212,165,116,0.07); border: 1px solid rgba(212,165,116,0.16); color: var(--warm); }

  /* CHEAT */
  .cheat { display: flex; flex-direction: column; gap: 9px; max-width: 740px; text-align: left; margin-top: 6px; }
  .ci { display: flex; gap: 10px; align-items: flex-start; padding: 11px 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--rule); border-radius: 9px; }
  .cin { font-family: 'EB Garamond', serif; font-size: 1.25rem; color: var(--gold); opacity: 0.55; min-width: 22px; line-height: 1; padding-top: 2px; }
  .cic strong { font-size: 0.86rem; font-weight: 600; display: block; margin-bottom: 2px; }
  .cic span { font-size: 0.76rem; color: var(--muted); line-height: 1.5; }

  /* COURSE CTA SLIDE */
  .cta-box {
    background: linear-gradient(135deg, rgba(201,168,76,0.1) 0%, rgba(92,184,138,0.06) 100%);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 16px;
    padding: 28px 32px;
    max-width: 640px;
    margin-top: 10px;
    text-align: center;
  }
  .cta-box h3 { font-family: 'EB Garamond', serif; font-size: 1.4rem; font-weight: 600; margin-bottom: 10px; }
  .cta-box p { font-size: 0.84rem; color: var(--muted); line-height: 1.7; margin-bottom: 18px; }
  .cta-btn {
    display: inline-block;
    background: var(--gold); color: #000;
    padding: 12px 28px; border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 700;
    text-decoration: none; cursor: pointer;
    border: none; transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .cta-btn:hover { background: #d4b55a; }
  .cta-price { font-size: 0.72rem; color: var(--muted); margin-top: 10px; }

  /* SHARE ROW */
  .share-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 16px; }
  .share-pill { padding: 8px 18px; border-radius: 999px; font-size: 0.78rem; font-weight: 600; border: 1px solid rgba(201,168,76,0.28); color: var(--gold); background: var(--gdim); cursor: pointer; transition: all 0.2s; }
  .share-pill:hover { background: rgba(201,168,76,0.18); }

  /* NEXT ED */
  .next-ed { margin-top: 20px; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); opacity: 0.5; }

  /* CLOSE DISC */
  .close-disc { max-width: 600px; margin-top: 18px; font-size: 0.68rem; line-height: 1.7; color: var(--muted); opacity: 0.5; border-top: 1px solid var(--rule); padding-top: 14px; }

  /* DOTS */
  #dots { position: fixed; right: 14px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 6px; z-index: 50; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.16); cursor: pointer; transition: all 0.2s; }
  .dot.active { background: var(--gold); transform: scale(1.6); }

  /* NAV */
  #nav { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: var(--ink); border-top: 1px solid var(--rule); display: flex; align-items: center; justify-content: center; gap: 10px; z-index: 200; }
  .nb { background: rgba(255,255,255,0.05); border: 1px solid var(--rule); color: var(--text); padding: 8px 20px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .nb:hover { background: rgba(255,255,255,0.09); }
  .nb.p { background: var(--gdim); border-color: rgba(201,168,76,0.32); color: var(--gold); }
  .nb.p:hover { background: rgba(201,168,76,0.18); }
  .nb:disabled { opacity: 0.22; cursor: default; }
  #ctr { font-size: 0.7rem; color: var(--muted); min-width: 40px; text-align: center; }

  @media (max-width:600px) {
    .slide { padding: 28px 20px 16px; }
    .display { font-size: 1.9rem; }
    .card-row, .vs-row { flex-direction: column; align-items: center; }
    .igrid { grid-template-columns: repeat(2,1fr); }
    #mast { padding: 0 16px; }
    #dots { display: none; }
  }
</style>
</head>

<div id="mast">
  <div class="mast-l">
    <span class="pub-nm">The Clarity Report</span>

</div>

<script>
const S = [

// 0 — COVER
{t:'t-ink',h:`
  <div class="kicker">An Independent Educational Publication · For Everyone</div>
  <div class="stamp"><span class="rom">Edition &nbsp;I</span><span class="sep">|</span><span class="dt">Your Money, The New Rules &nbsp;·&nbsp; 2026</span></div>
  <div class="display">Your Money.<br>The <em>New Rules.</em></div>
  <div class="deck">You've worked hard. You've managed your money the best you could with what you were given. Now the entire financial system is shifting — and nobody is explaining it in a way that actually makes sense. This is for you.</div>
  <div class="rule-line"></div>
  <div class="disc-band">⚠️ <strong>Educational content only.</strong> Nothing here is financial advice. It is produced for informational purposes only. Always do your own research and consult a licensed financial professional before making financial decisions. <em>The Clarity Report</em> is an anonymous independent publication.</div>
`},

// 1 — THIS IS FOR YOU
{t:'t-warm',h:`
  <div class="kicker">Before we begin</div>
  <div class="open-stmt">"Most financial education was never designed for people like us. It assumed a starting point we were never given. That changes right now."</div>
  <div class="rule-line"></div>
  <div class="deck">If you've ever felt behind, confused, or anxious when financial news hits — you're not alone and you're not the problem. The information was never made accessible. This report exists to change that. No jargon. No agenda. No assumptions about what you already know.</div>
  <div class="callout warm">This is plain-language financial education for people who have worked hard their whole lives and deserve to understand the system that holds their money — especially now that system is changing.</div>
`},

// 2 — WHY NOW
{t:'t-slate',h:`
  <div class="kicker">Why this moment matters</div>
  <div class="display">The biggest shift in how<br>money works in <em>50 years</em></div>
  <div class="deck">In 2025, the U.S. government passed its first-ever laws regulating digital money. The financial system that was already hard to navigate is now changing underneath everyone's feet — including people who never planned to touch crypto.</div>
  <div class="card-row">
    <div class="card">
      <span class="cg">🏛️</span>
      <div class="ct">New laws just passed</div>
      <div class="cb">Congress passed real crypto legislation in July 2025 — the first time ever. The rules of the financial game are being rewritten right now, whether you participate or not.</div>
    </div>
    <div class="card">
      <span class="cg">😰</span>
      <div class="ct">Uncertainty is real</div>
      <div class="cb">If this feels overwhelming, that's a completely reasonable response. The system is changing fast and most explanations assume knowledge most people were never given access to.</div>
    </div>
    <div class="card">
      <span class="cg">🧭</span>
      <div class="ct">Understanding is power</div>
      <div class="cb">You don't need to invest in crypto to be affected by this shift. But you do deserve to understand what's happening so you can make confident decisions when the time comes.</div>
    </div>
  </div>
`},

// 3 — WHAT IS MONEY
{t:'t-warm',h:`
  <div class="kicker">Start at the very beginning</div>
  <div class="display">What <em>is</em> money,<br>really?</div>
  <div class="deck">This might feel too basic — but it's the foundation everything else builds on. And it's something most people were never actually taught.</div>
  <div class="steps">
    <div class="step">
      <div class="sn">I</div>
      <div class="sc"><strong>Commodity money — ancient times</strong><span>Gold, silver, grain. Things with real physical value. You traded things that were actually useful.</span></div>
    </div>
    <div class="step">
      <div class="sn">II</div>
      <div class="sc"><strong>Paper backed by gold — pre-1971</strong><span>Paper notes existed but each one could be exchanged for actual gold. There was something real behind the paper.</span></div>
    </div>
    <div class="step">
      <div class="sn">III</div>
      <div class="sc"><strong>Fiat currency — right now, today</strong><span>Since 1971, the dollar is backed by nothing physical — just government decree and collective trust. The Fed can print more whenever it decides to. Your paycheck, your savings, your rent — all of it is built on that agreement.</span></div>
    </div>
  </div>
  <div class="callout gold">💡 Here's the thing nobody tells you: <strong>money has always been a technology.</strong> It gets upgraded. What's happening right now is the next upgrade — and you deserve to understand it.</div>
`},

// 4 — WHAT IS CRYPTO
{t:'t-deep',h:`
  <div class="kicker">The big idea</div>
  <div class="display">Crypto = money without<br>a <em>middleman</em></div>
  <div class="deck">Bitcoin launched in 2009 with one radical idea: what if people could send money directly to each other — without a bank standing in the middle, taking fees, setting hours, and deciding who gets access?</div>
  <div class="vs-row">
    <div class="vs-box old">
      <div class="vs-lbl">How your bank works today</div>
      <ul>
        <li>You ask permission to move your own money</li>
        <li>Bank checks your account balance</li>
        <li>Contacts the other bank</li>
        <li>Both banks update their private records</li>
        <li>Takes 1–5 business days</li>
        <li>Bank takes fees</li>
        <li>Bank can freeze or block it</li>
        <li>Closed nights, weekends, holidays</li>
      </ul>
    </div>
    <div class="vs-box new">
      <div class="vs-lbl">How crypto works</div>
      <ul>
        <li>You send directly — no permission needed</li>
        <li>Thousands of computers verify it</li>
        <li>Recorded permanently — no one can erase it</li>
        <li>No bank involved at all</li>
        <li>Minutes — sometimes seconds</li>
        <li>Tiny network fee, no corporate cut</li>
        <li>No one has the power to block it</li>
        <li>Works 24 hours, 7 days a week</li>
      </ul>
    </div>
  </div>
`},

// 5 — BLOCKCHAIN SIMPLE
{t:'t-slate',h:`
  <div class="kicker">The technology behind it — no technical knowledge needed</div>
  <div class="display">The blockchain is just a<br>very <em>special spreadsheet</em></div>
  <div class="deck">Imagine a Google Sheet tracking every financial transaction ever made. But instead of Google holding it on their servers, millions of computers around the world each hold an identical copy. No one owns it. No one can secretly change it. Nobody can shut it down.</div>
  <div class="flow">
    <div class="fn">You send crypto ✉️</div>
    <div class="fa">→</div>
    <div class="fn">Broadcast to thousands of computers 📡</div>
    <div class="fa">→</div>
    <div class="fn">Computers verify it's real ✅</div>
    <div class="fa">→</div>
    <div class="fn">Added to the record permanently 🔒</div>
    <div class="fa">→</div>
    <div class="fn">Recipient has the money 💰</div>
  </div>
  <div class="callout teal" style="margin-top:14px">Because the record lives on millions of computers simultaneously, there's no single bank to fail, no single company to hack, and no government that can simply delete it. That's why people find it powerful — and why governments are now writing laws around it.</div>
`},

// 6 — STABLECOINS
{t:'t-rich',h:`
  <div class="kicker">The part that affects everyone — not just investors</div>
  <div class="display">What is a <em>Stablecoin?</em></div>
  <div class="deck">Regular crypto like Bitcoin swings wildly in value — up 30% one week, down 40% the next. That's exciting for investors but terrifying for regular use. Stablecoins solve this problem by doing one thing extremely well: staying stable.</div>
  <div class="card-row">
    <div class="card">
      <span class="cg">⚓</span>
      <div class="ct">Always worth $1</div>
      <div class="cb">1 USDC (a stablecoin) = $1. Today. Tomorrow. Next year. It never moves. You get the speed and access of crypto with the stability of the dollar you already understand.</div>
    </div>
    <div class="card">
      <span class="cg">🏦</span>
      <div class="ct">Backed by real money</div>
      <div class="cb">For every stablecoin in circulation, the company must hold an equal amount of real U.S. dollars or Treasury bills in reserve. This is now federal law under the GENIUS Act.</div>

    <div class="card">
      <span class="cg">🌍</span>
      <div class="ct">Changes who has access</div>
      <div class="cb">Someone who has always been excluded from traditional banking — no minimum balance, no credit history required — can now hold and send "digital dollars" from a phone. This matters.</div>
    </div>
  </div>
  <div class="callout gold">Think of a stablecoin as a digital dollar that moves like a text message — instant, free, and available to anyone with a phone. No bank account required.</div>
`},

// 7 — GENIUS ACT
{t:'t-warm',h:`
  <div class="kicker">The law · Enacted July 18, 2025</div>
  <div class="display">The <em>GENIUS Act</em> —<br>plain English</div>
  <div class="deck">America's first major crypto law. It specifically governs stablecoins — the digital dollars that could soon sit alongside your regular bank account. Here's what it actually says.</div>
  <div class="steps">
    <div class="step">
      <div class="sn">💵</div>
      <div class="sc"><strong>Requires real money behind every stablecoin</strong><span>Every stablecoin must be backed dollar-for-dollar with real U.S. dollars or government Treasury bills. No more companies creating digital money out of thin air.</span></div>

      <div class="sn">🔍</div>

    <div class="step">
      <div class="sn">🏛️</div>

    </div>
    <div class="step">
      <div class="sn">🛡️</div>
      <div class="sc"><strong>Applies existing financial crime rules</strong><span>Anti-money laundering requirements now apply to stablecoin issuers — the same rules banks follow. The "anything goes" era is officially over.</span></div>
    </div>
  </div>
`},

// 8 — CLARITY ACT
{t:'t-deep',h:`
  <div class="kicker">The law still in progress · 2026</div>
  <div class="display">The <em>CLARITY Act</em> —<br>ending the confusion</div>
  <div class="deck">For 15 years, two powerful government agencies both claimed authority over crypto and fought constantly. Nobody knew who was in charge. The CLARITY Act finally answers that question — and opens the door for the system to function properly.</div>

let cur=0, tot=S.length;

function build(){
  const stage=document.getElementById('stage'), dots=document.getElementById('dots');
  S.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className=`slide ${s.t}`+(i===0?' active':'');
    d.innerHTML=s.h; stage.appendChild(d);
    const dt=document.createElement('div');
    dt.className='dot'+(i===0?' active':'');
    dt.onclick=()=>gt(i); dots.appendChild(dt);
  }); ui();
}

function gt(n){
  document.querySelectorAll('.slide')[cur].classList.remove('active');
  document.querySelectorAll('.dot')[cur].classList.remove('active');
  cur=Math.max(0,Math.min(n,tot-1));
  document.querySelectorAll('.slide')[cur].classList.add('active');
  document.querySelectorAll('.dot')[cur].classList.add('active');
  ui();
}

function ui(){
  const p=((cur+1)/tot*100).toFixed(1);
  document.getElementById('prog').style.width=p+'%';
  document.getElementById('ctr').textContent=`${cur+1} / ${tot}`;
  document.getElementById('ct').textContent=`${cur+1} / ${tot}`;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').textContent=cur===tot-1?'↩ Restart':'Next →';
}

function go(d){ if(d===1&&cur===tot-1){gt(0);return;} gt(cur+d); }
function shr(){ navigator.share?navigator.share({title:'The Clarity Report — Edition I',text:'The clearest plain-English explanation of the new financial system I have found.'}):navigator.clipboard.writeText(window.location.href).then(()=>alert('Link copied.')); }
function rst(){ gt(0); }

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
});

build();
</script>
